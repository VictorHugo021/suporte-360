<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suporte360 | Gestão de Help Desk</title>
  <meta name="description" content="Suporte360 - sistema de gestão de chamados de Help Desk com portais de Cliente e Suporte." />
  <meta name="theme-color" content="#2563eb" />
  <meta property="og:title" content="Suporte360 — Gestão de Help Desk" />
  <meta property="og:description" content="Abra, acompanhe e resolva chamados de suporte interno em tempo real." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/logo.png" />
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="apple-touch-icon" href="assets/icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===================== LOGIN ===================== -->
  <main id="loginScreen" class="login-screen">
    <div class="login-aurora" aria-hidden="true"></div>
    <section class="login-card" aria-labelledby="loginTitle">
      <img src="assets/logo.png" alt="Logo Suporte360" class="login-logo" />
      <h1 id="loginTitle">Acessar plataforma</h1>
      <p class="muted" id="loginSub">Entre com sua conta.</p>

      <div class="seg" id="authTabs" role="tablist" aria-label="Entrar ou criar conta">
        <button type="button" class="seg-btn active" data-mode="entrar"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
        <button type="button" class="seg-btn" data-mode="criar"><i class="bi bi-person-plus"></i> Criar conta</button>
      </div>

      <form id="loginForm" novalidate>
        <div id="nomeWrap" class="hidden">
          <label for="nome">Seu nome</label>
          <div class="field"><i class="bi bi-person-badge"></i><input id="nome" value=""></div>
        </div>

        <label for="email">E-mail</label>
        <div class="field"><i class="bi bi-envelope"></i><input id="email" type="email" autocomplete="username" value="" placeholder="Digite seu e-mail" required></div>

        <label for="senha">Senha</label>
        <div class="field">
          <i class="bi bi-lock"></i>
          <input id="senha" type="password" autocomplete="current-password" value="" placeholder="Digite sua senha" required>
          <button id="togglePassword" type="button" class="ghost-icon" aria-label="Mostrar senha" aria-pressed="false"><i class="bi bi-eye"></i></button>
        </div>

        <small id="senhaHint" class="senha-hint hidden">A senha deve ter no mínimo 6 caracteres.</small>

        <div id="senha2Wrap" class="hidden">
          <label for="senha2">Confirmar senha</label>
          <div class="field">
            <i class="bi bi-shield-lock"></i>
            <input id="senha2" type="password">
            <button id="togglePassword2" type="button" class="ghost-icon" aria-label="Mostrar senha" aria-pressed="false"><i class="bi bi-eye"></i></button>
          </div>
        </div>

        <div id="roleWrap" class="hidden">
          <label>Tipo de conta</label>
          <div class="seg" aria-label="Tipo de conta">
            <button type="button" class="seg-btn active" data-role="cliente"><i class="bi bi-person"></i> Cliente</button>
            <button type="button" class="seg-btn" data-role="suporte"><i class="bi bi-headset"></i> Suporte</button>
          </div>
        </div>

        <button class="btn primary full" type="submit" id="authSubmit">Entrar</button>
        <p class="login-hint" id="loginError" role="alert"></p>
      </form>
      <small class="muted" id="dbModeNote">Contas demo: ana@empresa.com (cliente) · tecnico@empresa.com (suporte) · senha 123456</small>
    </section>
  </main>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand-box"><img src="assets/logo.png" alt="Suporte360" class="brand"></div>
      <nav class="nav" id="navMenu" aria-label="Menu principal"></nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <span class="avatar" id="navAvatar">US</span>
          <span><strong id="navName">Usuário</strong><small id="navRole">—</small></span>
        </div>
      </div>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <button class="ghost-icon menu-toggle" onclick="toggleSidebar()" aria-label="Abrir menu"><i class="bi bi-list"></i></button>
          <div><h2 id="pageTitle">Dashboard</h2><span id="breadcrumb" class="muted">Início / Dashboard</span></div>
        </div>
        <div class="top-actions">
          <span id="dbBadge" class="db-badge" title="Origem dos dados"></span>
          <button id="weatherBox" class="weather-chip" onclick="navigate('configuracoes')" title="Configurar clima (API Ninjas)"><i class="bi bi-cloud"></i> <span>Clima --</span></button>
          <button class="ghost-icon" onclick="toggleTheme()" id="themeBtn" aria-label="Alternar tema"><i class="bi bi-moon-stars"></i></button>
          <button class="btn danger sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> <span>Sair</span></button>
        </div>
      </header>
      <div id="content" class="content"></div>
      <footer class="appfoot">Suporte360 · Gestão de chamados · Desenvolvimento de Interfaces</footer>
    </section>
  </div>

  <div id="toast" class="toast-msg hidden" role="status" aria-live="polite"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
