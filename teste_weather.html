<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste API Weather - API Ninjas</title>
  <style>
    body{font-family:Arial, sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.5;background:#f7f7f7;color:#222}
    .card{background:white;border:1px solid #ddd;border-radius:14px;padding:20px;box-shadow:0 2px 10px #0001}
    input,button{font-size:16px;padding:10px;border-radius:8px;border:1px solid #bbb}
    button{cursor:pointer;background:#111;color:white;border-color:#111}
    pre{background:#111;color:#0f0;padding:14px;border-radius:10px;white-space:pre-wrap;overflow:auto}
    .erro{color:#b00020;font-weight:bold}.ok{color:#087a1f;font-weight:bold}
  </style>
</head>
<body>
  <div class="card">
    <h1>Teste da API Weather</h1>
    <p>Use esta página para testar somente a API de clima de Blumenau por latitude/longitude, separada do sistema.</p>
    <label>Latitude:</label><br>
    <input id="lat" value="-26.91889"><br><br>
    <label>Longitude:</label><br>
    <input id="lon" value="-49.06583"><br><br>
    <button onclick="testarWeather()">Testar API por latitude/longitude</button>
    <p id="status">Aguardando teste...</p>
    <pre id="saida"></pre>
  </div>

  <script src="config.js"></script>
  <script>
    function testarWeather(){
      const lat = document.getElementById('lat').value.trim() || '-26.91889';
      const lon = document.getElementById('lon').value.trim() || '-49.06583';
      const key = (window.WEATHER_CONFIG && window.WEATHER_CONFIG.apiKey) || '';
      const status = document.getElementById('status');
      const saida = document.getElementById('saida');

      status.textContent = 'Testando...';
      status.className = '';
      saida.textContent = '';

      const xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://api.api-ninjas.com/v1/weather?lat=' + encodeURIComponent(lat) + '&lon=' + encodeURIComponent(lon), true);
      xhr.setRequestHeader('X-Api-Key', key);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function(){
        saida.textContent = xhr.responseText;
        if(xhr.status >= 200 && xhr.status < 300){
          status.textContent = 'Funcionou! Status ' + xhr.status;
          status.className = 'ok';
        }else{
          status.textContent = 'Erro da API. Status ' + xhr.status;
          status.className = 'erro';
        }
      };
      xhr.onerror = function(){
        status.textContent = 'Falha de rede/CORS. Abra pelo VS Code Live Server ou localhost, não direto pelo file://.';
        status.className = 'erro';
      };
      xhr.send();
    }
  </script>
</body>
</html>
